<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signaling Test</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #121212;
            color: #e0e0e0;
        }

        #log {
            width: 100%;
            height: 300px;
            background: #000;
            color: #0f0;
            overflow-y: scroll;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
        }

        input {
            padding: 10px;
            width: 250px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <h1>VoIP-as-a-Service MVP</h1>
    <div class="controls">
        <input type="text" id="room" placeholder="Enter room name" value="testroom">
        <button id="connect">Connect Signaling</button>
    </div>
    <div class="call-controls" style="margin-top: 20px;">
        <button id="startCall" disabled>📞 Start Call</button>
        <button id="muteBtn" disabled>🎤 Mute</button>
        <button id="hangup" disabled>🛑 Hangup</button>
        <div style="display:inline-block; vertical-align: middle; margin-left: 10px;">
            <canvas id="volumeMeter" width="100" height="20" style="background: #222; border-radius: 3px;"></canvas>
            <span style="font-size: 10px; color: #888; display: block;">Local Audio Activity</span>
        </div>
        <audio id="remoteAudio" autoplay controls style="vertical-align: middle; margin-left:10px;"></audio>
    </div>
    <div id="status" style="margin-top: 10px; color: #888;">Status: Idle</div>
    <div id="log"></div>

    <script>
        let socket = null;
        let localStream = null;
        let peerConnection = null;
        let isMuted = false;
        let animationId = null;
        let audioCtx = null;
        let analyser = null;
        let dataArray = null;
        let iceCandidatesQueue = [];

        const logDiv = document.getElementById('log');
        const roomInput = document.getElementById('room');
        const startCallBtn = document.getElementById('startCall');
        const muteBtn = document.getElementById('muteBtn');
        const hangupBtn = document.getElementById('hangup');
        const remoteAudio = document.getElementById('remoteAudio');
        const statusDiv = document.getElementById('status');
        const canvas = document.getElementById('volumeMeter');
        const canvasCtx = canvas.getContext('2d');

        const iceConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' }
            ]
        };

        function log(m) {
            logDiv.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${m}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(m);
        }

        // --- Local Volume Meter ---
        function startVolumeMeter(stream) {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                function draw() {
                    animationId = requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(dataArray);

                    canvasCtx.fillStyle = '#222';
                    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                    let sum = 0;
                    for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
                    let average = sum / bufferLength;

                    canvasCtx.fillStyle = average > 20 ? '#0f0' : '#444';
                    canvasCtx.fillRect(0, 0, Math.min((average / 100) * canvas.width, canvas.width), canvas.height);
                }
                draw();
            } catch (e) {
                log('AudioContext error: ' + e);
            }
        }

        function setStatus(s) {
            statusDiv.innerText = `Status: ${s}`;
        }

        // 1. Connect to Signaling Server
        document.getElementById('connect').onclick = () => {
            const roomName = roomInput.value;
            if (!roomName) return alert('Room name required');

            socket = new WebSocket(`ws://localhost:8000/ws/signaling/${roomName}/`);

            socket.onopen = () => {
                log(`Connected to signaling room: ${roomName}`);
                setStatus('Connected to Signaling');
                startCallBtn.disabled = false;
            };

            socket.onmessage = async (e) => {
                const data = JSON.parse(e.data);
                log(`Signal Received: ${data.type}`);

                if (data.type === 'offer') {
                    handleOffer(data.offer);
                } else if (data.type === 'answer') {
                    handleAnswer(data.answer);
                } else if (data.type === 'candidate') {
                    handleCandidate(data.candidate);
                } else if (data.type === 'hangup') {
                    log('Remote peer hung up');
                    endCall(false);
                }
            };

            socket.onclose = () => {
                log('Signaling disconnected');
                setStatus('Signaling Disconnected');
            };
        };

        // 2. Setup Peer Connection
        async function setupPeerConnection() {
            peerConnection = new RTCPeerConnection(iceConfig);

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.send(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
                }
            };

            peerConnection.ontrack = (event) => {
                log('Remote track received');
                if (remoteAudio.srcObject !== event.streams[0]) {
                    remoteAudio.srcObject = event.streams[0];
                }
            };

            peerConnection.oniceconnectionstatechange = () => {
                log(`WebRTC: ICE State -> ${peerConnection.iceConnectionState}`);
            };

            log('Requesting microphone access...');
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                log('Microphone access GRANTED');
                startVolumeMeter(localStream);

                localStream.getTracks().forEach(track => {
                    log(`Adding local track: ${track.kind}`);
                    peerConnection.addTrack(track, localStream);
                });
            } catch (err) {
                log('Microphone access DENIED: ' + err);
                alert('Microphone access is required for VoIP');
            }

            hangupBtn.disabled = false;
            muteBtn.disabled = false;
        }

        // 3. Initiate Call
        startCallBtn.onclick = async () => {
            log('Initiating call...');
            setStatus('Calling...');
            await setupPeerConnection();

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            socket.send(JSON.stringify({ type: 'offer', offer: offer }));
            log('Offer sent');
        };

        // 4. Handle Offer
        async function handleOffer(offer) {
            log('Inbound call detected...');
            setStatus('Incoming Call');
            if (!peerConnection) await setupPeerConnection();

            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            await processIceQueue();

            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            socket.send(JSON.stringify({ type: 'answer', answer: answer }));
            log('Answer sent');
        }

        // 5. Handle Answer
        async function handleAnswer(answer) {
            log('Call accepted');
            setStatus('In Call');
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            await processIceQueue();
        }

        // 6. Handle Candidate
        async function handleCandidate(candidate) {
            try {
                if (peerConnection && peerConnection.remoteDescription) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                } else {
                    log('WebRTC: Queueing ICE candidate (Remote description not yet set)');
                    iceCandidatesQueue.push(candidate);
                }
            } catch (e) {
                log('ICE candidate error: ' + e);
            }
        }

        async function processIceQueue() {
            log(`WebRTC: Processing ${iceCandidatesQueue.length} queued candidates`);
            while (iceCandidatesQueue.length > 0) {
                const candidate = iceCandidatesQueue.shift();
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                } catch (e) {
                    log('WebRTC: Error adding queued candidate: ' + e);
                }
            }
        }

        // 7. Mute/Unmute
        muteBtn.onclick = () => {
            if (localStream) {
                isMuted = !isMuted;
                localStream.getAudioTracks()[0].enabled = !isMuted;
                muteBtn.innerText = isMuted ? '🎙️ Unmute' : '🎤 Mute';
                log(isMuted ? 'Muted' : 'Unmuted');
            }
        };

        // 8. Hangup Logic
        function endCall(sendSignal = true) {
            if (sendSignal && socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'hangup' }));
            }

            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (animationId) cancelAnimationFrame(animationId);
            if (audioCtx) audioCtx.close();
            iceCandidatesQueue = [];

            hangupBtn.disabled = true;
            muteBtn.disabled = true;
            muteBtn.innerText = '🎤 Mute';
            isMuted = false;
            setStatus('Call Ended');
            log('Call ended locally');
        }

        hangupBtn.onclick = () => endCall(true);
    </script>
</body>

</html>
